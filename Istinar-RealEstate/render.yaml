services:
  - type: web
    name: istinar-real-estate-api
    runtime: docker
    rootDir: backend
    preDeployCommand: python manage.py migrate --noinput
    healthCheckPath: /api/health/
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: istinar-real-estate-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false

databases:
  - name: istinar-real-estate-db
    databaseName: istinar
    user: istinar
